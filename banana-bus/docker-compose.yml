services:
  api:
    build: 
      context: .
      dockerfile: ./api/Dockerfile
    ports:
      - "3000:3000"       
    depends_on:
      - mongo
    env_file:
      - ./api/.env


  mongo:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"     
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

