services:
  api:
    build: 
      context: .
      dockerfile: ./api/Dockerfile
    ports:
      - "3000:3000"       
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/app
    env_file:
      - .env


  mongo:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"     
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

